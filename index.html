<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وەشەن میدیا | Washan Media</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        /* پاشبنەمایەکی جوڵاو وەک کەڤەر */
        body {
            background: linear-gradient(-45deg, #020617, #1e1b4b, #312e81, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* ڕێگەدان بە دەرکەوتنی ناوەڕۆک لە سەرەوە */
            padding: 40px 20px;
            overflow-y: auto; /* سکڕۆڵ بۆ خوارەوە */
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin: 20px 0; /* بۆ ئەوەی لەسەرەوە و خوارەوە کەمێک بۆشایی هەبێت */
        }

        .logo-main {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h1 { font-size: 26px; margin-bottom: 5px; }
        .tagline { color: #38bdf8; font-size: 12px; letter-spacing: 2px; margin-bottom: 30px; }

        .links-container { display: flex; flex-direction: column; gap: 12px; }

        .link-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
            transform: translateY(-2px);
        }

        .link-icon {
            width: 45px;
            height: 45px;
            background: #0ea5e9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
        }

        .link-details { flex: 1; text-align: right; }
        .link-title { display: block; font-weight: 700; font-size: 15px; }
        .link-sub { font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-main">W</div>
        <h1>وەشەن میدیا</h1>
        <p class="tagline">WASHAN MEDIA OFFICIAL</p>

        <div class="links-container">
            <a href="https://www.tiktok.com/@washanmedia" class="link-card">
                <div class="link-icon"><i class="fab fa-tiktok"></i></div>
                <div class="link-details">
                    <span class="link-title">تیک تۆک</span>
                    <span class="link-sub">@washanmedia</span>
                </div>
            </a>
            <a href="https://www.facebook.com/share/18dSJLZmDo/" class="link-card">
                <div class="link-icon"><i class="fab fa-facebook-f"></i></div>
                <div class="link-details">
                    <span class="link-title">فەیسبووک</span>
                    <span class="link-sub">پەیجی فەرمی وەشەن</span>
                </div>
            </a>
            <a href="https://www.instagram.com/washan_media" class="link-card">
                <div class="link-icon"><i class="fab fa-instagram"></i></div>
                <div class="link-details">
                    <span class="link-title">ئینستاگرام</span>
                    <span class="link-sub">@washan_media</span>
                </div>
            </a>
            <a href="https://youtube.com/@washanmedia1" class="link-card">
                <div class="link-icon"><i class="fab fa-youtube"></i></div>
                <div class="link-details">
                    <span class="link-title">یوتیوب</span>
                    <span class="link-sub">سەبسکرایبمان بکەن</span>
                </div>
            </a>
            <a href="https://wa.me/9647515372521" class="link-card">
                <div class="link-icon"><i class="fab fa-whatsapp"></i></div>
                <div class="link-details">
                    <span class="link-title">واتسئاپ</span>
                    <span class="link-sub">پەیوەندی ڕاستەوخۆ</span>
                </div>
            </a>
        </div>

        <p style="margin-top: 30px; font-size: 10px; color: #475569;">© 2026 WASHAN MEDIA. ALL RIGHTS RESERVED.</p>
    </div>

</body>
</html>
