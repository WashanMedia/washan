<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وەشەن میدیا | Washan Media</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            /* کەڤەری دواوە: تێکەڵەیەک لە ڕەنگی گەش و جوڵاو */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto; /* سکڕۆڵ کار دەکات */
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* دروستکردنی کەشێکی "کەڤەر" بە تیشکی ڕووناکی */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 420px;
            width: 100%;
            /* شوشەیی (Glassmorphism) */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            margin: auto;
        }

        /* لۆگۆ */
        .logo-area { margin-bottom: 30px; }
        .logo-main {
            font-size: 85px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        h1 { color: #fff; font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .tagline { color: #38bdf8; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }

        /* دوگمە نوێیەکان بە ڕەنگی ئەکادیمی (Dark Blue/Cyan) */
        .links-container { display: flex; flex-direction: column; gap: 16px; }

        .link-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
        }

        .link-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #075985, #0ea5e9);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            margin-left: 15px;
        }

        .link-details { flex: 1; text-align: right; }
        .link-title { display: block; color: #fff; font-size: 17px; font-weight: 700; }
        .link-sub { color: rgba(255, 255, 255, 0.4); font-size: 11px; }

        .chevron { color: rgba(255, 255, 255, 0.2); font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <div class="logo-main">W</div>
            <h1>وەشەن میدیا</h1>
            <p class="tagline">WASHAN MEDIA OFFICIAL</p>
        </div>

        <div class="links-container">
            <a href="https://www.tiktok.com/@washanmedia" class="link-card">
                <div class="link-icon"><i class="fab fa-tiktok"></i></div>
                <div class="link-details">
                    <span class="link-title">تیک تۆک</span>
                    <span class="link-sub">فۆڵۆومان بکەن لە تیک تۆک</span>
                </div>
                <i class="fas fa-chevron-left chevron"></i>
            </a>

            <a href="https://www.facebook.com/share/18dSJLZmDo/" class="link-card">
                <div class="link-icon"><i class="fab fa-facebook-f"></i></div>
                <div class="link-details">
                    <span class="link-title">فەیسبووک</span>
                    <span class="link-sub">پەیجی فەرمی وەشەن میدیا</span>
                </div>
                <i class="fas fa-chevron-left chevron"></i>
            </a>

            <a href="https://www.instagram.com/washan_media" class="link-card">
                <div class="link-icon"><i class="fab fa-instagram"></i></div>
                <div class="link-details">
                    <span class="link-title">ئینستاگرام</span>
                    <span class="link-sub">نوێترین چالاکییەکان ببینن</span>
                </div>
                <i class="fas fa-chevron-left chevron"></i>
            </a>

            <a href="https://youtube.com/@washanmedia1" class="link-card">
                <div class="link-icon"><i class="fab fa-youtube"></i></div>
                <div class="link-details">
                    <span class="link-title">یوتیوب</span>
                    <span class="link-sub">بینەری ڤیدیۆکانمان بن</span>
                </div>
                <i class="fas fa-chevron-left chevron"></i>
            </a>

            <a href="https://wa.me/9647515372521" class="link-card">
                <div class="link-icon"><i class="fab fa-whatsapp"></i></div>
                <div class="link-details">
                    <span class="link-title">واتسئاپ</span>
                    <span class="link-sub">پەیوەندی ڕاستەوخۆ و ڕیکلام</span>
                </div>
                <i class="fas fa-chevron-left chevron"></i>
            </a>
        </div>

        <p style="margin-top: 40px; color: rgba(255,255,255,0.2); font-size: 10px; letter-spacing: 1px;">DEVELOPED FOR WASHAN MEDIA © 2026</p>
    </div>

</body>
</html>
