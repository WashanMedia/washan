<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وەشەن میدیا | Washan Media</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --glass-bg: rgba(10, 10, 10, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden; /* ڕێگری لە سکڕۆڵکردنی زیادە */
            position: relative;
        }

        /* پاشبنەمای جوڵاو (Animated Mesh Gradient) */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* تەنۆلکە جوڵاوەکان */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
            animation: floatOrb 20s infinite alternate;
        }

        @keyframes floatOrb {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* کارتە ئەکادیمییەکە */
        .container {
            max-width: 400px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لۆگۆ */
        .logo-box {
            margin-bottom: 25px;
        }
        .logo-text {
            font-size: 70px;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -2px;
        }

        h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* لیستەی لینکەکان */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.03);
        }

        .icon-wrap {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            margin-left: 15px; /* بۆ لای ڕاست */
        }

        .link-info {
            flex: 1;
            text-align: right;
        }

        .link-name {
            display: block;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
        }

        .link-user {
            font-size: 11px;
            color: #64748b;
        }

        .fa-chevron-left {
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

        <h1>وەشەن میدیا</h1>

        <div class="links">

                <div class="link-info">

                </div>
                <i class="fas fa-chevron-left"></i>
            </a>

            <a href="https://www.facebook.com/share/18dSJLZmDo/" class="link-card">
                <div class="icon-wrap"><i class="fab fa-facebook-f"></i></div>
                <div class="link-info">
                    <span class="link-name">فەیسبووک</span>

                <div class="icon-wrap"><i class="fab fa-instagram"></i></div>
                <div class="link-info">
                    <span class="link-name">ئینستاگرام</span>

                </div>
                <i class="fas fa-chevron-left"></i>
            </a>

            <a href="https://youtube.com/@washanmedia1" class="link-card">
                <div class="icon-wrap"><i class="fab fa-youtube"></i></div>
                <div class="link-info">
                    <span class="link-name">یوتیوب</span>

                </div>

            <a href="https://wa.me/9647515372521" class="link-card">

                </div>

        <p style="margin-top: 40px; color: #475569; font-size: 10px;">© 2026 WASHAN MEDIA. ALL RIGHTS RESERVED.</p>
    </div>

</body>
</html>
