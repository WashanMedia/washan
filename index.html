<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وەشەن میدیا - لینکەکانم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a; /* ڕەنگە ڕەشە تۆخەکەی خۆت */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* چارەسەری نەجوڵان */
            padding: 20px;
            direction: rtl;
            overflow-y: auto; /* سکڕۆڵ کار دەکات */
        }

        /* بەکگراوەندی ئەسڵی خۆت کە gradient-ەکەی لەسەرە */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #00c8ff, #667eea, #764ba2, #00c8ff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            opacity: 0.15;
            z-index: -1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin: 20px 0;
        }

        .logo-circle {
            width: 140px; height: 140px;
            border-radius: 50%;
            background: linear-gradient(145deg, #222, #000);
            margin: 0 auto 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 2px solid #00c8ff;
        }

        .logo-w {
            font-size: 70px; font-weight: 900;
            background: linear-gradient(135deg, #00c8ff, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 { color: #ffffff; font-size: 32px; margin-bottom: 8px; }
        .subtitle { color: #00c8ff; font-size: 16px; margin-bottom: 25px; }

        .links { display: flex; flex-direction: column; gap: 15px; }
        .link-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            transition: 0.3s;
        }

        .link-button:hover {
            background: rgba(0, 200, 255, 0.1);
            border-color: #00c8ff;
        }

        .link-icon {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-circle">
            <div class="logo-w">W</div>
        </div>
        <h1>وەشەن میدیا</h1>
        <p class="subtitle">تۆڕی سۆشیال میدیای وەشەن</p>

        <div class="links">
            <a href="#" class="link-button">
                <div class="link-icon" style="background: #25D366;"><i class="fab fa-whatsapp"></i></div>
                <div><strong>واتسئاپ</strong></div>
            </a>
            <a href="#" class="link-button">
                <div class="link-icon" style="background: #FF0000;"><i class="fab fa-youtube"></i></div>
                <div><strong>یوتیوب</strong></div>
            </a>
            </div>
    </div>

</body>
</html>
